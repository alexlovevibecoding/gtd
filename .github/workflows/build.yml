name: Build and Deploy GTD App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint code
      run: npm run lint --if-present
      
    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      env:
        CI: true
        
    - name: Build application
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files-${{ matrix.node-version }}
        path: build/
        retention-days: 7
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.node-version == '20.x'
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  server-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Test server startup
      run: |
        timeout 30s npm run server &
        SERVER_PID=$!
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:3001/api/health || exit 1
        
        # Clean shutdown
        kill $SERVER_PID || true
        
    - name: Test database operations
      run: |
        node -e "
          const GTDDatabase = require('./server/database');
          const db = new GTDDatabase('test.db');
          
          (async () => {
            await db.init();
            console.log('✅ Database initialized');
            
            // Test basic operations
            const item = await db.createItem({
              title: 'Test Item',
              status: 'inbox'
            });
            console.log('✅ Item created:', item.id);
            
            const items = await db.getAllItems();
            console.log('✅ Items retrieved:', items.length);
            
            await db.deleteItem(item.id);
            console.log('✅ Item deleted');
            
            db.close();
            console.log('✅ Database tests passed');
          })().catch(err => {
            console.error('❌ Database test failed:', err);
            process.exit(1);
          });
        "

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: npm audit --audit-level moderate
      
    - name: Scan for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  deploy:
    needs: [test-and-build, server-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build for production
      run: npm run build
      env:
        CI: false  # Treat warnings as warnings, not errors
        GENERATE_SOURCEMAP: false  # Reduce build size
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: success()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        cname: mygtd.example.com  # Replace with your domain if you have one
        
    - name: Create Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          ## What's Changed
          - Automated build and deployment
          - Build artifact: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          
          ## Deployment
          🚀 Deployed to GitHub Pages
          
          Built with ❤️ by GitHub Actions
        draft: false
        prerelease: false