name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test -- --coverage --watchAll=false || echo "No tests configured"
      env:
        CI: true
        
    - name: Build application
      run: npm run build
      
    - name: Check for security vulnerabilities
      run: npm audit --audit-level high
      
    - name: Auto-approve and merge patch updates
      if: success()
      run: |
        # Get PR details
        PR_TITLE="${{ github.event.pull_request.title }}"
        echo "PR Title: $PR_TITLE"
        
        # Check if it's a patch update (safe to auto-merge)
        if [[ "$PR_TITLE" =~ ^Bump.*from.*to.*$ ]]; then
          # Extract version info
          if [[ "$PR_TITLE" =~ (from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "✅ Patch version update detected"
            echo "This appears to be a safe patch update"
          elif [[ "$PR_TITLE" =~ (from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.[0-9]+) ]]; then
            echo "⚠️ Minor version update - manual review recommended"
            exit 0
          elif [[ "$PR_TITLE" =~ (from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.) ]]; then
            echo "🚫 Major version update - requires manual review"
            exit 0
          fi
        fi
        
        # Auto-approve if all checks pass
        if [ $? -eq 0 ]; then
          echo "All checks passed, approving Dependabot PR"
          gh pr review --approve "${{ github.event.pull_request.number }}" --body "Auto-approved: All checks passed ✅"
          
          # Wait a moment for approval to register
          sleep 5
          
          # Auto-merge if approved
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
          echo "✅ Auto-merge enabled for approved Dependabot PR"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}